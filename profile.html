<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile Card</title>
  <style>
    .card {
      width: 300px;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 20px;
      text-align: center;   
      font-family: Arial, sans-serif;
    }
    .card img {
      width: 150px;
      border-radius: 50%;
    }
    .card h2 {
      margin: 10px 0 5px;
    }
    .card p {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFRAc-Ox4wXavrXDh-zgBhepePGTMDtk2Jetepl5Uf97qjboraA2HIzidLHmnVLCLMu0M&usqp=CAU" alt="Profile Photo" />
    <h2>Your Name</h2>
    <p>Short description about you.</p>
  </div>
</body>
</html>
