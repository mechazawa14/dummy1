<!DOCTYPE html>
<html>
<head>
    <title>Weekly Timetable</title>
    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">My Weekly Timetable</h2>

<table>
    <tr>
        <th>Day</th>
        <th>Activity</th>
    </tr>
    <tr><td>Monday</td><td>Java Class</td></tr>
    <tr><td>Tuesday</td><td>Cyber Security</td></tr>
    <tr><td>Wednesday</td><td>DevOps Lab</td></tr>
    <tr><td>Thursday</td><td>Mini Project</td></tr>
    <tr><td>Friday</td><td>Sports / Free Time</td></tr>
    <tr><td>Saturday</td><td>Revision</td></tr>
    <tr><td>Sunday</td><td>Rest</td></tr>
</table>

</body>
</html>
